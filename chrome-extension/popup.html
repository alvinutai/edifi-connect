<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EDiFi Connect</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      background: #f9fafb;
      color: #111827;
    }
    .header {
      background: #001f71;
      color: white;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; }
    .logo span { color: #4ba8f0; }
    .sub { font-size: 11px; opacity: 0.7; margin-top: 1px; }
    .body { padding: 14px 16px; }
    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 10px;
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      margin-bottom: 10px;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dot.green { background: #22c55e; }
    .dot.yellow { background: #f59e0b; }
    .dot.gray { background: #9ca3af; }
    .status-label { font-size: 12px; color: #374151; margin-left: 8px; flex: 1; }
    .sessions-section { margin-bottom: 12px; }
    .sessions-title { font-size: 11px; font-weight: 600; color: #6b7280; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
    .session-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      margin-bottom: 4px;
    }
    .session-name { font-size: 12px; color: #111827; flex: 1; }
    .session-time { font-size: 10px; color: #9ca3af; }
    .no-sessions { font-size: 12px; color: #9ca3af; text-align: center; padding: 12px; }
    .register-section { border-top: 1px solid #e5e7eb; padding-top: 12px; }
    .register-title { font-size: 12px; font-weight: 600; margin-bottom: 8px; color: #374151; }
    input {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      font-size: 12px;
      margin-bottom: 6px;
      outline: none;
    }
    input:focus { border-color: #2563eb; }
    button {
      width: 100%;
      padding: 8px;
      background: #001f71;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #0b2a8a; }
    .help-text { font-size: 10px; color: #9ca3af; margin-top: 8px; text-align: center; }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <div class="logo">e<span>D</span>iFi <span style="font-weight:400;font-size:14px">Connect</span></div>
      <div class="sub">Portal session bridge</div>
    </div>
  </div>
  <div class="body">

    <div class="status-row">
      <div class="dot" id="service-dot"></div>
      <div class="status-label" id="service-label">Checking local service...</div>
    </div>

    <div class="sessions-section">
      <div class="sessions-title">Active Portal Sessions</div>
      <div id="sessions-list"></div>
    </div>

    <div class="register-section" id="register-section" style="display:none">
      <div class="register-title">Connect to EDiFi</div>
      <input type="text" id="office-id-input" placeholder="Office ID (from EDiFi Settings)" />
      <button id="register-btn">Connect This Office</button>
      <div class="help-text">Get your Office ID from EDiFi → Settings → Office tab</div>
    </div>

  </div>
  <script src="popup.js"></script>
</body>
</html>
